<body class="bg-gray-100">
  <div class="container mx-auto p-4">
    <h1 class="text-3xl font-bold text-center mb-8">Restaurantes</h1>

    <!-- Lista de Restaurantes -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
      <div *ngFor="let restaurante of restaurantes" class="bg-white shadow-md rounded-lg p-4 m-1 w-80">
        <img [src]="restaurante.imagem_url" [alt]="'Foto do ' + restaurante.nome"
          class="w-full h-40 object-cover mb-4 rounded-lg">
        <div class="space-y-2">
          <h3 class="text-lg font-semibold">{{ restaurante.nome }}</h3>
          <p class="text-gray-600 text-sm">
            <i class="fas fa-map-marker-alt mr-1"></i> {{ restaurante.endereco }}
          </p>
          <div class="flex justify-between text-gray-600 text-sm">
            <span>
              <i class="fas fa-clock mr-1"></i>
              {{ restaurante.horario_abertura }} - {{ restaurante.horario_fechamento }}
            </span>
          </div>
          <button routerLink="/reserva" class="w-full bg-red-600 text-white py-2 px-4 rounded transition 
                  hover:bg-red-700 focus:outline-none focus:ring-2">
            Reservar Agora
          </button>
        </div>
      </div>
    </div>

    <!-- Seção de Pratos -->
    <h2 class="text-2xl font-bold text-center my-8">Principais Pratos</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
      <div *ngFor="let prato of pratos" class="bg-white shadow-md rounded-lg p-4 m-1 w-80">
        <img [src]="prato.imagem_url" alt="Imagem do prato" class="w-full h-40 object-cover mb-4 rounded-lg">
        <div class="bg-gray-200 p-2 text-center">
          <p class="text-gray-700">{{ prato.nome }}</p>
          <div class="flex justify-center items-center mt-2">
            <span *ngFor="let estrela of [1, 2, 3, 4, 5]" class="text-yellow-500">
              <i class="fas fa-star"></i>
            </span>
            <span class="text-gray-700 ml-2">({{ prato.avaliacao }})</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
<router-outlet></router-outlet>
