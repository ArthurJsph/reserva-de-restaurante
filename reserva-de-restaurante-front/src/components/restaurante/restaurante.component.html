<body class="bg-gray-100">
  <div class="container mx-auto p-4">
    <!-- Mensagem de erro -->
    <div *ngIf="erroCarregamento" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
      <span class="block sm:inline">{{ erroCarregamento }}</span>
    </div>

    <!-- Título da página -->
    <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">Restaurantes</h1>

    <!-- Carregamento -->
    <div *ngIf="isLoading" class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-red-600"></div>
    </div>

    <!-- Lista de restaurantes -->
    <div *ngIf="!isLoading && restaurantes.length > 0" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
      <div *ngFor="let restaurante of restaurantes" class="bg-white shadow-md rounded-lg p-4 m-1 w-80">
        <!-- Imagem do restaurante -->
        <img [src]="restaurante.imagem_url" [alt]="'Foto do ' + restaurante.nome"
          class="w-full h-40 object-cover mb-4 rounded-lg">

        <!-- Detalhes do restaurante -->
        <div class="space-y-2">
          <h3 class="text-lg font-semibold">{{ restaurante.nome }}</h3>
          <p class="text-gray-600 text-sm">
            <i class="fas fa-map-marker-alt mr-1"></i> {{ restaurante.endereco }}
          </p>
          <p class="text-gray-600 text-sm">
            <i class="fas fa-utensils mr-1"></i> {{ restaurante.tipoCozinha }}
          </p>
          <p class="text-gray-600 text-sm">
            <i class="fas fa-users mr-1"></i> Capacidade: {{ restaurante.capacidade }} pessoas
          </p>
          <button routerLink="/reserva" class="w-full bg-red-600 text-white py-2 px-4 rounded transition 
                  hover:bg-red-700 focus:outline-none focus:ring-2">
            Reservar Agora
          </button>
        </div>
      </div>
    </div>

    <!-- Mensagem caso não haja restaurantes -->
    <div *ngIf="!isLoading && restaurantes.length === 0" class="text-center text-gray-500">
      Nenhum restaurante encontrado.
    </div>
  </div>
</body>
<router-outlet></router-outlet>
