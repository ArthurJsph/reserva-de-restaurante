<body class="bg-gray-100">
    <div class="container mx-auto p-4">
     <h1 class="text-3xl font-bold text-center mb-8">
      Restaurantes
     </h1>
     <!-- Card de Restaurante -->
<div *ngFor="let restaurante of restaurantes" class="bg-white shadow-md rounded-lg p-4">
    <!-- Imagem -->
    <img [src]="restaurante.imagem_url" 
         [alt]="'Foto do ' + restaurante.nome" 
         class="w-full h-40 object-cover mb-4 rounded-lg">
  
    <!-- Informações -->
    <div class="space-y-2">
      <h3 class="text-lg font-semibold">{{ restaurante.nome }}</h3>
      
      <p class="text-gray-600 text-sm">
        <i class="fas fa-map-marker-alt mr-1"></i>
        {{ restaurante.endereco }}
      </p>
  
      <div class="flex justify-between text-gray-600 text-sm">
        <span>
          <i class="fas fa-clock mr-1"></i>
          {{restaurante.horario_abertura}} -
          {{restaurante.horario_fechamento}}
        </span>
      </div>
  
      <p class="text-gray-700 mb-4"></p>
  
      <button class="w-full bg-red-600 text-white py-2 px-4 rounded transition 
                      hover:bg-red-700 focus:outline-none focus:ring-2">
        Reservar Agora
      </button>
    </div>
  </div>
