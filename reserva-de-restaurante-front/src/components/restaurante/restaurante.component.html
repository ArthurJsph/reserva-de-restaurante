<body class="bg-gray-100">
  <div class="container mx-auto p-4">
    <!-- Mensagem de erro -->
    <div *ngIf="erroCarregamento" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
      <span class="block sm:inline"><i class="fas fa-exclamation-circle mr-2"></i>{{ erroCarregamento }}</span>
    </div>

    <!-- Título da página -->
    <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">Restaurantes</h1>

    <!-- Carregamento -->
    <div *ngIf="isLoading" class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-red-600"></div>
    </div>

    <!-- Lista de restaurantes -->
    <div *ngIf="!isLoading && restaurantes.length > 0" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
      <div *ngFor="let restaurante of restaurantes" class="bg-white shadow-md rounded-lg p-4 m-1 w-80 max-w-sm">
        <!-- Imagem do restaurante -->
        <img [src]="restaurante.imagem_url" [alt]="'Foto do restaurante ' + restaurante.nome" class="w-full h-40 object-cover mb-4 rounded-lg">

        <!-- Detalhes do restaurante -->
        <div class="space-y-2">
          <h3 class="text-lg font-semibold">{{ restaurante.nome }}</h3>
          <p class="text-gray-600 text-sm">
            <i class="fas fa-map-marker-alt mr-1"></i> {{ restaurante.endereco }}
          </p>
          <p class="text-gray-600 text-sm">
            <i class="fas fa-utensils mr-1"></i> {{ restaurante.tipoCozinha }}
          </p>
          <p class="text-gray-600 text-sm">
            <i class="fas fa-users mr-1"></i> Capacidade: {{ restaurante.capacidade }} pessoas
          </p>
          <button routerLink="/reserva" class="w-full bg-red-600 text-white py-2 px-4 rounded transition hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500" aria-label="Reservar um restaurante agora">
            Reservar Agora
          </button>
        </div>
      </div>
    </div>

    <!-- Mensagem caso não haja restaurantes -->
    <div *ngIf="!isLoading && restaurantes.length === 0" class="flex justify-center items-center min-h-[200px]">
      <div class="bg-amber-100 border border-amber-300 rounded-lg p-6 text-center max-w-lg mx-auto shadow-md space-y-4">
        <svg class="w-16 h-16 mx-auto text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <p class="text-amber-600 font-bold text-2xl">Nenhum restaurante encontrado.</p>
      </div>
    </div>
    
  </div>
</body>
<router-outlet></router-outlet>
