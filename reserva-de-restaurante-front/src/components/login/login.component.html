<body class="flex items-center justify-center min-h-screen bg-gray-900 bg-opacity-50">
    <div class="bg-white bg-opacity-80 p-8 rounded-lg shadow-lg w-80">
      <h1 class="text-2xl font-bold text-center mb-6">Login</h1>
      
      <!-- Mensagem de erro -->
      <div *ngIf="errorMessage" class="mb-4 p-2 bg-red-100 text-red-700 rounded text-sm">
        {{ errorMessage }}
      </div>
      
      <form (ngSubmit)="login()">
        <div class="mb-4">
          <input 
            type="email" 
            placeholder="Email" 
            class="w-full p-4 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500" 
            [(ngModel)]="email"
            name="email"
            required
          >
        </div>
        <div class="mb-4">
          <input 
            type="password" 
            placeholder="Senha" 
            class="w-full p-4 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500" 
            [(ngModel)]="senha"
            name="senha"
            required
          >
        </div>
        <div class="mb-6">
          <button 
            type="submit" 
            class="w-full p-4 rounded-full bg-yellow-500 text-white font-bold hover:bg-yellow-600 transition-colors"
            [disabled]="isLoading"
          >
            <span *ngIf="!isLoading">LOGIN</span>
            <span *ngIf="isLoading">AUTENTICANDO...</span>
          </button>
        </div>
        <div class="flex justify-between text-sm text-gray-700">
          <a routerLink="/esqueceu-senha" class="hover:underline">Esqueceu a senha?</a>
          <a routerLink="/registrar" class="hover:underline">Criar conta</a>
        </div>
      </form>

    </div>
  </body>

<router-outlet></router-outlet>
