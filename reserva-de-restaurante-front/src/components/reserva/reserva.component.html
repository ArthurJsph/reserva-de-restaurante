<section class="max-w-5xl mx-auto mt-10">
  <h2 class="text-3xl font-bold text-center mb-8 text-gray-800">
    Sistema de Reservas
  </h2>

  <!-- Alerta de sucesso -->
  <div *ngIf="submitted" class="bg-green-100 border border-green-400 text-green-700 px-6 py-4 rounded text-center mb-6">
    <p class="text-lg font-semibold">Reserva realizada com sucesso!</p>
  </div>

  <!-- Formulário -->
  <form (ngSubmit)="onSubmit()" class="bg-white p-6 rounded-lg shadow-md mb-20">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-gray-700 font-medium mb-2">Nome do Restaurante</label>
        <input [(ngModel)]="reserva.nome_restaurante" name="nome_restaurante" required type="text"
          class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500" />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">ID do Restaurante</label>
        <input [(ngModel)]="reserva.id_restaurante" name="id_restaurante" required type="number"
          class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500" />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">Data da Reserva</label>
        <input [(ngModel)]="reserva.data_reserva" name="data_reserva" required type="date"
          class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500" />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">Hora da Reserva</label>
        <input [(ngModel)]="reserva.hora_reserva" name="hora_reserva" required type="time"
          class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500" />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">Número de Pessoas</label>
        <input [(ngModel)]="reserva.numero_pessoas" name="numero_pessoas" required type="number" min="1"
          class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500" />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">Nome do Responsável</label>
        <input [(ngModel)]="reserva.nome_responsavel" name="nome_responsavel" required type="text"
          class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500" />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">CPF do Responsável</label>
        <input [(ngModel)]="reserva.cpf_responsavel" name="cpf_responsavel" required type="text"
          class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500" />
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-2">Telefone do Responsável</label>
        <input [(ngModel)]="reserva.telefone_responsavel" name="telefone_responsavel" required type="tel"
          class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-amber-500" />
      </div>
    </div>

    <div class="mt-6 text-center">
      <button type="submit"
        class="bg-amber-600 text-white px-6 py-3 rounded-full font-semibold hover:bg-amber-700 transition duration-300">
        Criar Reserva
      </button>
    </div>
  </form>
</section>
