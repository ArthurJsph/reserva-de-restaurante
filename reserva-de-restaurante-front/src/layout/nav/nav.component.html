<body class="bg-gray-100">
  <header class="bg-gray-800 text-white p-4 flex flex-col items-center md:flex-row md:justify-between md:items-center">
    <!-- Título -->
    <div class="text-2xl font-bold mb-4 md:mb-0">
      <a routerLink="/" class="hover:text-yellow-500 transition-colors duration-300">ReservaGourmet</a>
    </div>

    <!-- Navegação -->
    <nav class="flex flex-col items-center space-y-2 md:flex-row md:space-y-0 md:space-x-4">
      <a 
        routerLink="/restaurante" 
        routerLinkActive="text-white font-bold" 
        class="text-gray-300 hover:text-white transition-colors duration-300"
      >
        Restaurantes
      </a>
      <a 
        routerLink="/reserva" 
        routerLinkActive="text-white font-bold" 
        class="text-gray-300 hover:text-white transition-colors duration-300"
      >
        Reservar
      </a>
      <a 
        routerLink="/user/minha-reserva" 
        routerLinkActive="text-white font-bold" 
        class="text-gray-300 hover:text-white transition-colors duration-300"
      >
        Minhas Reservas
      </a>

      <!-- Botão Dinâmico (Login ou Minha Conta) -->
      <ng-container *ngIf="isLoggedIn(); else loginSection">
        <button 
          routerLink="/perfil"
          class="bg-yellow-500 text-black px-4 py-2 rounded hover:bg-yellow-600 transition-colors duration-300 flex items-center"
        >
          <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
          Minha Conta
        </button>
      </ng-container>

      <!-- Seção de Login -->
      <ng-template #loginSection>
        <button 
          routerLink="/login"
          class="bg-yellow-500 text-black px-4 py-2 rounded hover:bg-yellow-600 transition-colors duration-300"
        >
          Login
        </button>
      </ng-template>
    </nav>
  </header>

  <router-outlet></router-outlet>
</body>
