<!-- Password Recovery Form -->
<div class="flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full p-6 bg-white rounded-lg shadow-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Recuperar Senha</h1>
            <p class="text-gray-600">Digite seu e-mail para receber instruções</p>
        </div>
        <!-- Mensagem de feedback -->
        <div id="message" class="hidden p-4 mb-4 rounded-md">
            <div class="flex items-center space-x-2">
                <i class="fas fa-info-circle text-blue-500"></i>
                <p class="text-gray-700">Enviamos um link para seu e-mail!</p>
            </div>
        </div>
        <form id="forgotForm">
            <div class="mb-4">
                <label for="email" class="block text-gray-700 mb-2">E-mail</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600"
                    placeholder="seu@email.com"
                >
            </div>
            <button 
                type="submit"
                class="w-full bg-red-600 text-white py-2 px-4 rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 transition duration-200"
            >
                Enviar Instruções
            </button>
        </form>
        <div class="mt-4 text-center">
            <a href="/login" class="text-red-600 hover:text-red-700 font-medium text-sm">
                Voltar para Login
            </a>
        </div>
    </div>
</div>
