<div class="min-h-screen bg-gray-100 py-8">
  <div class="max-w-4xl mx-auto">
    <!-- Cabeçalho do Perfil -->
    <div class="flex flex-col md:flex-row gap-8 mb-8">
      <!-- Informações Nome e Descrição -->
      <div class="w-full md:w-1/3 flex flex-col items-center justify-center">
        <h1 class="text-2xl font-bold text-gray-800 text-center">{{ usuario.nome }}</h1>
      </div>

      <!-- Dados Pessoais -->
      <div class="w-full md:w-2/3 bg-white rounded-2xl shadow-md p-6">
        <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Informações Pessoais</h2>
        
        <form>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Nome -->
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-bold mb-2">Nome Completo</label>
              <input type="text" [(ngModel)]="usuario.nome" name="nome"
                     class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500"
                     placeholder="Digite seu nome completo">
            </div>

            <!-- Email -->
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
              <input type="email" [(ngModel)]="usuario.email" name="email"
                     class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500"
                     placeholder="Digite seu email">
            </div>

            <!-- Telefone -->
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-bold mb-2">Telefone</label>
              <input 
                type="text" 
                [(ngModel)]="usuario.telefone" 
                name="telefone"
                mask="(00) 00000-0000" 
                class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500"
                placeholder="(__) _____-____">
            </div>

            <!-- CPF -->
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-bold mb-2">CPF</label>
              <input 
                type="text" 
                [(ngModel)]="usuario.cpf" 
                name="cpf"
                mask="000.000.000-00" 
                class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500"
                placeholder="___.___.___-__">
            </div>
          </div>

          <!-- Alterar Senha (Acordeão) -->
          <div class="mt-6">
            <div class="border rounded-lg overflow-hidden">
              <input type="checkbox" id="toggle-password" class="hidden peer">
              <label for="toggle-password" class="flex justify-between items-center p-4 bg-gray-50 cursor-pointer">
                <span class="font-bold text-gray-700">Alterar Senha</span>
                <svg class="w-5 h-5 text-gray-500 transform peer-checked:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </label>
              <div class="hidden peer-checked:block p-4 bg-white">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Nova Senha</label>
                    <input type="password" placeholder="••••••••" 
                           class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500">
                  </div>
                  <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Confirmar Senha</label>
                    <input type="password" placeholder="••••••••" 
                           class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-500">
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Botões -->
          <div class="flex justify-end gap-4 mt-8">
            <button type="button" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100 transition">
              Cancelar
            </button>
            <button type="submit" (click)="salvarAlteracoes()" class="px-6 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 focus:outline-none focus:ring-2 focus:ring-yellow-500 transition">
              Salvar Alterações
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Configurações de Conta -->
    <div class="bg-white rounded-2xl shadow-md p-6 mb-10">
      <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Configurações da Conta</h2>
      <div class="space-y-4">
        <!-- Botão de Logout -->
        <div class="flex justify-between items-center pt-0.5 ">
          <div>
            <h3 class="font-medium text-gray-800">Sair da Conta</h3>
            <p class="text-sm text-gray-600">Você será desconectado imediatamente</p>
          </div>
          <button 
            (click)="logout()" 
            class="px-4 py-2 text-sm bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition"
          >
            Sair
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
